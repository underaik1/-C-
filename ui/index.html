<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Сапер</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <header class="top-panel">
            <div class="brand">
                <h1>Сапер</h1>
                <p>Минималистичный режим</p>
            </div>
            <div class="controls">
                <label class="control" for="difficulty-trigger"><span>Сложность</span></label>
                <div class="mode-select" id="mode-select">
                    <button id="difficulty-trigger" class="mode-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                        <span id="difficulty-label">Простой</span>
                        <span class="mode-caret" aria-hidden="true"></span>
                    </button>
                    <ul id="difficulty-menu" class="mode-menu" role="listbox" hidden>
                        <li><button type="button" class="mode-item is-selected" data-value="easy" aria-selected="true">Простой</button></li>
                        <li><button type="button" class="mode-item" data-value="medium" aria-selected="false">Средний</button></li>
                        <li><button type="button" class="mode-item" data-value="hard" aria-selected="false">Сложный</button></li>
                    </ul>
                </div>
                <button id="restart" type="button">Новая игра</button>
            </div>
        </header>

        <section class="stats">
            <div class="stat-box">
                <span class="stat-label">Мин осталось</span>
                <strong id="mines-left">0</strong>
            </div>
            <div class="stat-box">
                <span class="stat-label">Флагов</span>
                <strong id="flags-count">0</strong>
            </div>
            <div class="stat-box">
                <span class="stat-label">Размер поля</span>
                <strong id="board-size">0x0</strong>
            </div>
        </section>

        <section class="board-panel" id="board-panel">
            <div id="board" class="board" aria-label="Игровое поле"></div>
        </section>

        <p id="message" class="message">ЛКМ: открыть клетку, ПКМ: поставить флаг.</p>
    </main>

    <script src="vendor/anime.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
